<div class="firstmsg-panel">

  {{!-- Connection Profile 선택 --}}
  <div class="firstmsg-section">
    <div class="firstmsg-row-label">
      <label>🔌 커넥션 프로필</label>
      <span class="firstmsg-hint">비워두면 현재 연결된 API 사용</span>
    </div>
    <div class="firstmsg-profile-row">
      <select id="firstmsg-profile-select">
        <option value="">(현재 연결된 API 사용)</option>
      </select>
      <button id="firstmsg-profile-refresh" class="menu_button" title="프로필 목록 새로고침">↻</button>
    </div>
  </div>

  {{!-- 캐릭터 설명 --}}
  <div class="firstmsg-section">
    <div class="firstmsg-row-label">
      <label for="firstmsg-char-desc">📋 캐릭터 설명 / 퍼소나</label>
      <button id="firstmsg-autofill-btn" class="menu_button firstmsg-small-btn" title="현재 캐릭터 정보 자동 채우기">자동 채우기</button>
    </div>
    <textarea id="firstmsg-char-desc" rows="5"
      placeholder="캐릭터의 성격, 특징, 배경을 입력하세요.&#10;예) 냉소적이고 말수가 적은 탐정. 항상 담배를 피우며 반말을 사용한다."></textarea>
  </div>

  {{!-- 그리팅 --}}
  <div class="firstmsg-section">
    <label for="firstmsg-greeting">💬 그리팅 / 시나리오 (참고용)</label>
    <textarea id="firstmsg-greeting" rows="5"
      placeholder="기존 그리팅 메시지나 시나리오를 붙여넣으세요.&#10;NPC 정보, 세계관, 상황도 여기에 넣어주세요."></textarea>
  </div>

  {{!-- 추가 요청 --}}
  <div class="firstmsg-section">
    <label for="firstmsg-user-note">✏️ 추가 요청 사항 (선택)</label>
    <textarea id="firstmsg-user-note" rows="2"
      placeholder="예) 200자 내외로, 불안한 분위기로, {{user}}가 처음 도착하는 장면으로 시작"></textarea>
  </div>

  {{!-- 옵션 --}}
  <div class="firstmsg-section firstmsg-options">
    <label class="firstmsg-checkbox-label">
      <input type="checkbox" id="firstmsg-use-actions" checked>
      <span>행동 묘사 포함 <em>(*이탤릭*)</em></span>
    </label>
    <label class="firstmsg-checkbox-label">
      <input type="checkbox" id="firstmsg-use-dialogue" checked>
      <span>대사 포함</span>
    </label>
    <label class="firstmsg-checkbox-label">
      <input type="checkbox" id="firstmsg-korean" checked>
      <span>한국어 출력</span>
    </label>
  </div>

  {{!-- 생성 버튼 --}}
  <div class="firstmsg-btn-row">
    <button id="firstmsg-generate-btn" class="menu_button firstmsg-main-btn">✨ 퍼스트 메시지 생성</button>
    <button id="firstmsg-clear-btn" class="menu_button">🗑️ 초기화</button>
  </div>

  {{!-- 로딩 --}}
  <div id="firstmsg-loading" style="display:none;">
    <div class="firstmsg-spinner"></div>
    <span id="firstmsg-loading-text">생성 중...</span>
  </div>

  {{!-- 결과 --}}
  <div id="firstmsg-result-area" style="display:none;">
    <div class="firstmsg-result-header">
      <label>✅ 생성된 퍼스트 메시지</label>
      <span id="firstmsg-char-count" class="firstmsg-char-count"></span>
    </div>
    <textarea id="firstmsg-result"></textarea>
    <div class="firstmsg-btn-row">
      <button id="firstmsg-copy-btn" class="menu_button">📋 복사하기</button>
      <button id="firstmsg-regen-btn" class="menu_button">🔄 다시 생성</button>
    </div>
  </div>

</div>
